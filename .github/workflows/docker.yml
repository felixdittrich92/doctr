name: docker

on:
  push:
    branches: main
  pull_request:
    branches: main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  docker-package:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: SYSTEM=cpu
          tags: doctr-py3.10-slim
          load: true
          cache-from: type=gha,scope=docker-package
          cache-to: type=gha,scope=docker-package,mode=max
      - name: Run docker container
        run: docker run doctr-py3.10-slim python3 -c 'import doctr'

  pytest-api:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest]
        python: ["3.11"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Build & run docker
        run: cd api && make lock && make run
      - name: Ping server
        run: wget --spider --tries=12 http://localhost:8080/docs
      - name: Run docker test
        run: cd api && make test
